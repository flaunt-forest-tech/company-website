name: Deploy to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Skip when deploy hook is not configured
        if: ${{ secrets.VERCEL_DEPLOY_HOOK == '' }}
        run: |
          echo "VERCEL_DEPLOY_HOOK is not set, so the manual deploy hook step is being skipped."
          echo "If you want GitHub Actions to explicitly trigger flauntforest, add the hook URL in repo Settings > Secrets and variables > Actions."

      - name: Trigger Vercel Deploy Hook
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          curl --fail --silent --show-error --location --retry 3 --request POST "$VERCEL_DEPLOY_HOOK"
          echo "Vercel deploy hook triggered successfully."
